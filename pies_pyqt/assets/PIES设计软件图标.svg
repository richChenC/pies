<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="50%" stop-color="#1E293B" />
      <stop offset="100%" stop-color="#0F172A" />
    </linearGradient>

    <linearGradient id="coilingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="50%" stop-color="#0EA5E9" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0.0" />
    </linearGradient>

    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34D399" />
      <stop offset="70%" stop-color="#059669" />
      <stop offset="100%" stop-color="#065F46" stop-opacity="0" />
    </radialGradient>

    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.6" />
    </filter>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bgGrad)" filter="url(#dropShadow)" />

  <g opacity="0.05" stroke="#FFFFFF" stroke-width="1">
    <line x1="32" y1="144" x2="480" y2="144" />
    <line x1="32" y1="256" x2="480" y2="256" />
    <line x1="32" y1="368" x2="480" y2="368" />
    <line x1="144" y1="32" x2="144" y2="480" />
    <line x1="256" y1="32" x2="256" y2="480" />
    <line x1="368" y1="32" x2="368" y2="480" />
  </g>

  <g transform="translate(256, 240)">
    <ellipse cx="0" cy="0" rx="140" ry="70" fill="none" stroke="url(#coilingGrad)" stroke-width="14" opacity="0.3" />
    <ellipse cx="0" cy="0" rx="110" ry="55" fill="none" stroke="url(#coilingGrad)" stroke-width="10" opacity="0.6" />
    <ellipse cx="0" cy="0" rx="80" ry="40" fill="none" stroke="url(#coilingGrad)" stroke-width="8" filter="url(#glow)" />
    
    <path d="M -160 0 C -80 -40, 80 40, 160 0" fill="none" stroke="#22D3EE" stroke-width="4" opacity="0.4" stroke-dasharray="8 4" />
  </g>

  <polygon points="196,160 316,160 356,340 156,340" fill="url(#scanGrad)" opacity="0.25" />

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 160 180 L 120 180 L 120 360 L 392 360 L 392 180 L 352 180" stroke="#38BDF8" stroke-width="12" />
    
    <path d="M 256 120 L 256 260" stroke="#34D399" stroke-width="16" filter="url(#glow)" />
    <path d="M 220 156 L 256 120 L 292 156" stroke="#34D399" stroke-width="16" />
  </g>

  <circle cx="256" cy="240" r="30" fill="url(#coreGrad)" filter="url(#glow)" />
  <circle cx="256" cy="240" r="8" fill="#FFFFFF" />

  <circle cx="120" cy="180" r="6" fill="#38BDF8" />
  <circle cx="392" cy="180" r="6" fill="#38BDF8" />
  <circle cx="170" cy="310" r="4" fill="#34D399" />
  <circle cx="342" cy="310" r="4" fill="#38BDF8" />
</svg>
